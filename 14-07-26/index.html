<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="estilo.css">
  <title>pasaporte de bares</title>
</head>

<body>
  <main>
    <section id="acceso">
      <h1>Pasaporte de tapas del Raval</h1>
      <p>Visita los 19 bares de la ruta y completa tu pasaporte digital</p>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="tu nombre aqui">
      <button id="btnEntrar">Entrar</button>
      <p id="mensajeAcceso"></p>
    </section>
    <section id="pasaporte">
      <header>
        <h2 id="saludo"></h2>
        <p id="progreso"></p>
        <div class="barra"></div>
        <div class="barraProgreso">

        </div>
        <p id="estadoPasaporte"></p>
      </header>
      <section id="listaBares"></section>
      <p id="mensajeSello"></p>
    </section>

  </main>
  <script src="estilo.css"></script>
</body>

</html>
