<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="estilo.css">
  <title>brower control</title>
</head>

<body>
  <header class="cabecera">
    <p class="etiqueta">sistema iniciado</p>
    <h1>Cosicas del Navegador</h1>
    <p id="saludo">hola, visitantes</p>
    <button id="btnNombre">identificarme</button>
  </header>
  <main>
    <section class="panel">
      <div class="tituloSeccion">
        <div>
          <p class="etiqueta">Diagnostico</p>
          <h2>Ventana de navegación</h2>
        </div>
      </div>
      <div class="datos">



        <article class="dato">
          <h3>tamaño visible</h3>
          <p id="tamañoVentana"> --- </p>
        </article>
        <article class="dato">
          <h3>Idioma</h3>
          <p id="idiomaNavegador"> --- </p>
        </article>
<article class="dato">
          <h3>Conexión</h3>
          <p id="estadoConexion"> --- </p>
        </article>
<article class="dato">
          <h3>Pagina actual</h3>
          <p id="paginaActual"> --- </p>
        </article>


      </div>
<div class="acciones">
  <button id="btnTitulo">Cambiar título</button>
  <button id="btnModo">modo oscuro</button> 
</div>
    </section>
    <section class="panel">
      <div class="tituloSeccion">
        <div>
      <p class="etiqueta">DOM dinamico</p>
      <h2>Centro de mensajes</h2>
    </div>
<span id="contadorMensajes">0 mensajes</span>
</div>
<div class="formularioMensaje">
  <input type="text" id="campoMensaje" placeholder="tu mensaje Aqui">
  <button id="btnAñadir">Añadir mensaje</button>
</div>
<div class="listaMensajes"></div> 
    </section>
  </main>
  <div id="notificaciones">accion completa</div>


  <script src="java.js"></script>
</body>

</html>
